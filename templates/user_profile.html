{% extends 'base.html' %}
{% block title %}Мой профиль{% endblock %}

{% block content %}
<div class="container">
    <div class="profile-header">
        <div class="profile-avatar">
            {{ profile_user.username|slice:":1"|upper }}
        </div>
        <div>
            <h2 style="margin-bottom:0.2rem;">{{ profile_user.username }}</h2>
            <p class="text-secondary">{{ profile_user.get_role_display }}</p>
        </div>
    </div>

    <div class="card">
        <h3 class="card-title">Моё портфолио</h3>
        <p class="card-text">Здесь будут отображаться ваши проекты после интеграции с GitHub.</p>
    </div>
</div>
{% endblock %}
