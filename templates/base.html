{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DEVfolio{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}"><span>DEV</span>folio</a>
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                    <li class="navbar-text">👤 {{ user.username }}</li>
                    <li><a class="nav-link" href="{% url 'profile' %}">Профиль</a></li>
                    <li><a class="nav-link" href="{% url 'logout' %}">Выйти</a></li>
                {% else %}
                    <li><a class="nav-link" href="{% url 'login' %}">Войти</a></li>
                    <li><a class="nav-link" href="{% url 'register' %}">Регистрация</a></li>
                {% endif %}
                <li><button class="theme-toggle" id="themeToggle">☀️</button></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            © 2026 DEVfolio
        </div>
    </footer>

    <script>
        const html = document.documentElement;
        const toggle = document.getElementById('themeToggle');
        const saved = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', saved);
        toggle.textContent = saved === 'light' ? '🌙' : '☀️';

        toggle.addEventListener('click', () => {
            const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            toggle.textContent = next === 'light' ? '🌙' : '☀️';
        });
    </script>
</body>
</html>
