{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container form-container">
    <div class="card">
        <h2 class="card-title">Регистрация</h2>
        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="form-label">Имя пользователя</label>
                <input type="text" name="username" id="id_username" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="id_password1" class="form-label">Пароль</label>
                <input type="password" name="password1" id="id_password1" class="form-control" required>
            </div>
            <div class="mb-4">
                <label for="id_password2" class="form-label">Подтверждение пароля</label>
                <input type="password" name="password2" id="id_password2" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        </form>
        <p class="text-secondary text-center mt-4">Уже есть аккаунт? <a href="{% url 'login' %}" class="nav-link" style="display:inline;">Войти</a></p>
    </div>
</div>
{% endblock %}
